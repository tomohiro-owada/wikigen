name: Generate Wiki

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - '*.go'
      - 'go.mod'
      - 'go.sum'

permissions:
  contents: write

jobs:
  wiki:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.22'

      - name: Build wikigen
        run: go build -o wikigen .

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Claude CLI
        run: npm install -g @anthropic-ai/claude-code

      - name: Generate wiki
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: ./wikigen -lang en -pp 3 -model haiku -token "$GITHUB_TOKEN" tomohiro-owada/wikigen

      - name: Push to wiki
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git clone https://x-access-token:${GITHUB_TOKEN}@github.com/tomohiro-owada/wikigen.wiki.git wiki-repo 2>/dev/null || {
            echo "::warning::Wiki not initialized. Enable Wiki in repo settings and create an initial page."
            exit 0
          }
          cp -r wiki-output/wikigen/* wiki-repo/
          cd wiki-repo
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          if git diff --staged --quiet; then
            echo "No wiki changes"
          else
            git commit -m "Update wiki ($(date -u +%Y-%m-%d))"
            git push
            echo "Wiki updated successfully"
          fi
