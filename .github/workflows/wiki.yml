name: Generate Wiki

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - '*.go'
      - 'go.mod'
      - 'go.sum'

permissions:
  contents: write

jobs:
  wiki:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.22'

      - name: Build wikigen
        run: go build -o wikigen .

      - name: Generate wiki
        uses: anthropics/claude-code-action@v1
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          prompt: |
            Run the wikigen tool to generate wiki documentation for this repository.

            1. Run this command:
            ```bash
            GITHUB_TOKEN="${{ secrets.GITHUB_TOKEN }}" ./wikigen -lang en -pp 3 -model haiku -token "${{ secrets.GITHUB_TOKEN }}" tomohiro-owada/wikigen
            ```

            2. After wikigen finishes, push the generated wiki to GitHub Wiki:
            ```bash
            git clone https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/tomohiro-owada/wikigen.wiki.git wiki-repo
            cp -r wiki-output/wikigen/* wiki-repo/
            cd wiki-repo
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git add -A
            git diff --staged --quiet || (git commit -m "Update wiki ($(date -u +%Y-%m-%d))" && git push)
            ```
          claude_args: "--dangerously-skip-permissions --model haiku --max-turns 30"
